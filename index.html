<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Schapentracker — Minimal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <h1>Schapentracker</h1>

    <section>
      <h2>Weides</h2>
      <form id="paddock-form">
        <input id="paddock-name" placeholder="Naam weide" required>
        <button type="submit">Toevoegen</button>
      </form>
      <ul id="paddock-list"></ul>
    </section>

    <section>
      <h2>Schapen</h2>
      <form id="sheep-form">
        <input id="sheep-tag" placeholder="Tag" required>
        <select id="sheep-paddock"></select>
        <button type="submit">Toevoegen</button>
      </form>
      <ul id="sheep-list"></ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
